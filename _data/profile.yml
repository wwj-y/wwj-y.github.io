short_bio: >-
  <p>
    I am a third-year undergraduate student at
    <a href="https://www.wyc.tsinghua.edu.cn/" target="_blank">Weiyang College</a>,
    <a href="https://www.tsinghua.edu.cn/" target="_blank">Tsinghua University</a>,
    pursuing a dual bachelor's degree in Mathematics and Physics and Software Engineering.
  </p>
  <p>
    My research aims to build models that capture low-dimensional intrinsic laws behind complex observations and interactions.
    Current interests include
    <em>video generation, vision-language models, and 3D vision with physically grounded, embodied interaction</em>.
  </p>
  <p>
    I welcome discussions and collaborations, both online and offline, and would be happy to talk about potential research opportunities.
    <strong>Currently seeking Ph.D. positions starting in Fall 2027.</strong>
  </p>

