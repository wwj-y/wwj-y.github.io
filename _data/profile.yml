short_bio: >-
  <p>
    I am a third-year undergraduate student at
    <a href="https://www.wyc.tsinghua.edu.cn/" target="_blank">Weiyang College</a>,
    <a href="https://www.tsinghua.edu.cn/" target="_blank">Tsinghua University</a>,
    pursuing a dual bachelor's degree in Mathematical and Physical Sciences and Software Engineering.
  </p>
  <p>
    My research interest lies in understanding physical structure through learning systems—
    how models can capture, preserve, and reason about the physical world across generation,
    interaction, and 3D perception.     I am particularly interested in
    <em>video generation</em>,
    <em>vision-language models</em>,
    and <em>3D vision</em> with physically grounded, embodied interaction.
  </p>
  <p>
    Please feel free to reach out—I warmly welcome discussions and collaborations,
    both online and offline.
    <strong>I am currently seeking Ph.D. positions in the United States for Fall 2027</strong>,
    and would be glad to chat about research fit and possible ways to work together.
  </p>

